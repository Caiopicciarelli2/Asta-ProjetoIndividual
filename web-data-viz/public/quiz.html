<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asta - Quiz</title>

    <link rel="stylesheet" href="./css/quiz.css">
    <link rel="icon" href="./assets/icones/logo.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body onload="onloadEsconder()">
    <header>
        <div class="navbar">
            <div class="nav-logo">
                <h1>
                    Black
                </h1>
                <img src="./assets/icones/logo.png" alt="logo_nav">
                <h1>Cover</h1>
            </div>
            <div class="nav-links">
                <ul id="nav-links-ul">
                    <li>
                        <a href="./index.html">Home</a>
                    </li>
                    <li>
                        <a class="selected" href="./historia.html">História</a>
                    </li>
                    <li>
                        <a class="nav-disabled">Quiz</a>
                    </li>
                    <li>
                        <a class="nav-disabled">Placar</a>
                    </li>
                    <li>
                        <a class="nav-disabled">Seu Status</a>
                    </li>
                </ul>
            </div>
            <div class="nav-buttons" id="nav-buttons">
                <button class="btn-login" onclick="redirecionamento_login()">
                    Logar
                </button>
                <button class="btn-cadastrar" onclick="redirecionamento_cadastro()">
                    Cadastrar-se
                </button>
            </div>
            <div class="container-perfil" id="perfil-user">

            </div>
        </div>
    </header>

    <!--divisao nav-->

    <div class="divisao-nav" style="height: 10vh; width: 100%;">

    </div>

    <main>
        <div class="container-quiz">
            <div class="container-quiz-title">
                <h1>
                    ESCOLHA SEU <span>QUIZ</span>
                </h1>
            </div>
            <div class="content-quiz">
                <div class="quiz-box" id="quiz-1">
                    <div class="overlay-quiz-box">

                    </div>
                    <div class="box-quiz-title">
                        <h1>
                            <i class="fa-solid fa-clipboard-list" style="color: rgb(255, 255, 255);"></i>
                            QUIZ <span>GERAL</span>
                        </h1>
                    </div>
                    <div class="box-quiz-desc">
                        <p>
                            TESTE SEUS <br>
                            <span>CONHECIMENTOS</span> <br>
                            SOBRE BLACK CLOVER
                        </p>
                    </div>
                    <div class="box-quiz-button">
                        <button>
                            INCIAR QUIZ <i class="fa-solid fa-arrow-right" style="color: rgb(255, 255, 255);"></i>
                        </button>
                    </div>
                </div>
                <div class="quiz-box" id="quiz-2">
                    <div class="overlay-quiz-box">

                    </div>
                    <div class="box-quiz-title">
                        <h1>
                            <i class="fa-brands fa-battle-net" style="color: rgb(255, 255, 255);"></i>
                            QUIZ <span>PODERES</span>
                        </h1>
                    </div>
                    <div class="box-quiz-desc">
                        <p>
                            VOCÊ CONHECE<br>
                            <span> OS PODERES</span> <br>
                            MAIS FORTES?
                        </p>
                    </div>
                    <div class="box-quiz-button">
                        <button>
                            INCIAR QUIZ <i class="fa-solid fa-arrow-right" style="color: rgb(255, 255, 255);"></i>
                        </button>
                    </div>
                </div>
                <div class="quiz-box" id="quiz-3">
                    <div class="overlay-quiz-box">

                    </div>
                    <div class="box-quiz-title">
                        <h1>
                            <i class="fa-solid fa-user-ninja" style="color: rrgb(255, 255, 255)"></i>
                            QUIZ <span>PERSONAGENS</span>
                        </h1>
                    </div>
                    <div class="box-quiz-desc">
                        <p>
                            VOCÊ REALMENTE<br>
                            CONHECE OS<br>
                            <span>PERSONAGENS</span>?
                        </p>
                    </div>
                    <div class="box-quiz-button">
                        <button>
                            INCIAR QUIZ <i class="fa-solid fa-arrow-right" style="color: rgb(255, 255, 255);"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
