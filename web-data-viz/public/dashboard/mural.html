<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="icon" href="../assets/icones/logo.png">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asta - Mural</title>


    <link rel="stylesheet" href="./css/mural.css">
    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body> <!--onload="validarSessao(), atualizarFeed()"-->

    <header>
        <div class="navbar">
            <div class="nav-logo">
                <h1>
                    Black
                </h1>
                <img src="../assets/icones/logo.png" alt="logo_nav">
                <h1>Cover</h1>
            </div>
            <div class="nav-links">
                <ul id="nav-links-ul">
                    <li>
                        <a href="../index.html">
                            Home
                        </a>
                    </li>
                    <li>
                        <a class="selected" href="../index.html">
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="./mural.html">
                            Mural de Avisos
                        </a>
                    </li>
                </ul>
            </div>
            <div class="nav-buttons" id="nav-buttons">
                <img src="../assets/icones/user-asta.png" alt="icone_asta" title="Clique para ver seu perfil."
                    id="btn-icone-perfil">
            </div>
            <div class="container-perfil" id="perfil-user">

            </div>
        </div>

        <div class="mural-avisos">
            <div class="avisos">
                <div id="alerta">
                </div>
                <div class="container">
                    <h1>Publicar um aviso</h1>
                    <div class="div-form">
                        <form id="form_postagem" method="post" onsubmit="return publicar()">
                            <label>
                                Título:
                                <br>
                                <input name="titulo" id="titulo" maxlength="100" type="text">
                            </label>
                            <br>
                            <br>
                            <label>
                                Descrição (máximo de 250 caracteres):
                                <br>
                                <textarea name="descricao" id="textarea_descricao" maxlength="250" rows="5"></textarea>
                            </label>
                            <br>
                            <br>
                            <button>Enviar</button>
                        </form>
                    </div>
                    <h1>Mural de Avisos</h1>
                    <div class="div-results">
                        <div id="feed_container" class="feed-container">
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </header>

</body>
</html>

<script src="./js/mural.js"></script>
