<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Asta - Cadastro</title>

    <script src="./js/sessao.js"></script>
    <script src="./js/redirecionamento.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./css/login_cadastro.css" />
    <link rel="icon" href="./assets/imgs/logo.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
    <div class="container-cadastro">
        <button onclick="redirecionamento_home()" class="btn-home">HOME</button>
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <i class="fa-solid fa-circle-xmark" id="btn_fechar_card_erro"></i>
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="content-cadastro">
            <div class="content-cadastro-row">
                <div class="cadastro-row-text">
                    <p>BEM VINDO DE VOLTA!</p>
                </div>
                <div class="cadastro-row-title">
                    <h1>
                        CADAS<span>TRE-SE</span>
                    </h1>
                </div>
                <div class="cadastro-row-text">
                    <span class="divisao-titulo-cadastro">
                        <img src="./assets/imgs/icone-folha.png" alt="logo_nav">
                    </span>
                    <p class="text-cadastro">
                        Entre em sua conta para continuar
                        sua jornada e acompanhar seu progresso.
                    </p>
                </div>
            </div>
            <div class="content-cadastro-row c-form">
                <div class="c-campo">
                    <i class="fa-solid fa-user i-user"></i>
                    <span>Nome Completo:</span>
                    <input id="nome_input" type="text" placeholder="Seu nome" />
                </div>
                <div class="c-campo-duble">
                    <div class="c-sub-campo">
                        <i class="fa-solid fa-address-card  i-cpf"></i>
                        <span>CPF:</span>
                        <input id="cpf_input" type="number" placeholder="Seu cpf" />
                    </div>
                    <div class="c-sub-campo">
                        <i class="fa-solid fa-envelope i-email"></i>
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Digite seu email" />
                    </div>
                </div>
                <div class="c-campo">
                    <i class="fa-solid fa-lock i-senha"></i>
                    <span>Senha:</span>
                    <input id="senha_input" type="password" placeholder="Digite sua senha" />
                </div>
                <div class="c-campo">
                    <i class="fa-solid fa-lock i-confirm-senha"></i>
                    <span>Confirmação da Senha:</span>
                    <input id="confirmacao_senha_input" type="password" placeholder="Confirme sua senha" />
                </div>

                <div id="div_aguardar" class="loading-div">
                    <img src="./assets/circle-loading.gif" id="loading-gif" />
                </div>

                <div id="div_erros_login"></div>
            </div>
            <div class="content-cadastro-row-button">
                <div class="cadastro-row-button">
                    <button class="btn-cadastro" onclick="cadastrar()">
                        <img src="./assets/imgs/logo.png" alt="logo_nav">
                        CADASTRAR-SE
                        <i class="fa-solid fa-arrow-right-long"></i>
                    </button>
                </div>
                <div class="cadastro-row-button">
                    <button class="btn-c-logar" onclick="redirecionamento_login()">
                        JÁ TEM CONTA? <span>FAÇA LOGIN</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<script>

    let btn_fechar_erro = document.getElementById('btn_fechar_card_erro');

    btn_fechar_erro.addEventListener('click', ()=>{
        cardErro.style.display = 'none';
    })

    // Array para armazenar empresas cadastradas para validação de código de ativação 
    let listaEmpresasCadastradas = [];

    function cadastrar() {
        // aguardar();

        //Recupere o valor da nova input pelo nome do id
        // Agora vá para o método fetch logo abaixo
        var nomeVar = nome_input.value;
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;
        var confirmacaoSenhaVar = confirmacao_senha_input.value;
        var codigoVar = codigo_input.value;
        var idEmpresaVincular
        var cpfVar = cpf_input.value;

        // Verificando se há algum campo em branco
        if (
            nomeVar == "" ||
            cpfVar == "" ||
            emailVar == "" ||
            senhaVar == "" ||
            confirmacaoSenhaVar == "" ||
            codigoVar == ""
        ) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML =
                "(Mensagem de erro para todos os campos em branco)";

            finalizarAguardar();
            return false;
        } else {
            setInterval(sumirMensagem, 5000);
        }

        // // verificacao nome tamanho
        // if (nomeVar.length <= 1) {
        //   alert('Seu nome deve ter mais de uma letra!');
        //   finalizarAguardar();
        //   return false;
        // } else {
        //   setInterval(sumirMensagem, 5000);
        // }

        // // email verificação
        // if ((emailVar.includes("@")) && (emailVar.includes("."))) {
        //   alert('Seu email deve conter "@" e "."');
        //   finalizarAguardar();
        //   return false;
        // } else {
        //   setInterval(sumirMensagem, 5000);
        // }

        // // verificacao cpf tamanho
        // if (cpfVar.length == 11) {
        //   alert('Seu CPF deve ter 11 dígitos');
        //   finalizarAguardar();
        //   return false;
        // } else {
        //   setInterval(sumirMensagem, 5000);
        // }

        // // verificação senha
        // if (senhaVar != confirmacaoSenhaVar) {
        //   alert('Suas senhas devem coincidir!');
        //   finalizarAguardar();
        //   return false;
        // } else {
        //   setInterval(sumirMensagem, 5000);
        // }


        // Verificando se o código de ativação é de alguma empresa cadastrada
        for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
            if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
                idEmpresaVincular = listaEmpresasCadastradas[i].id
                console.log("Código de ativação válido.");
                break;
            } else {
                cardErro.style.display = "block";
                mensagem_erro.innerHTML = "(Mensagem de erro para código inválido)";
                finalizarAguardar();
            }
        }

        // Enviando o valor da nova input
        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                // crie um atributo que recebe o valor recuperado aqui
                // Agora vá para o arquivo routes/usuario.js
                nomeServer: nomeVar,
                cpfServer: cpfVar,
                emailServer: emailVar,
                senhaServer: senhaVar,
                idEmpresaVincularServer: idEmpresaVincular
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    cardErro.style.display = "block";

                    mensagem_erro.innerHTML =
                        "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

                    setTimeout(() => {
                        window.location = "login.html";
                    }, "2000");

                    limparFormulario();
                    finalizarAguardar();
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                finalizarAguardar();
            });

        return false;
    }

    // Listando empresas cadastradas 
    function listar() {
        fetch("/empresas/listar", {
            method: "GET",
        })
            .then(function (resposta) {
                resposta.json().then((empresas) => {
                    empresas.forEach((empresa) => {
                        listaEmpresasCadastradas.push(empresa);

                        console.log("listaEmpresasCadastradas")
                        console.log(listaEmpresasCadastradas[0].codigo_ativacao)
                    });
                });
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }

    function sumirMensagem() {
        cardErro.style.display = "none";
    }
</script>
